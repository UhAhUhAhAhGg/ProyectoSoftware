openapi: 3.0.3
info:
  title: Events API
  version: 1.0.0
  description: API for managing events and ticket types.
paths:
  /api/v1/categories/:
    get:
      operationId: categories_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - categories
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
    post:
      operationId: categories_create
      tags:
      - categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/v1/categories/{id}/:
    get:
      operationId: categories_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - categories
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    put:
      operationId: categories_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Category'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Category'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Category'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    patch:
      operationId: categories_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - categories
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCategory'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
    delete:
      operationId: categories_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Category.
        required: true
      tags:
      - categories
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/categories/active/:
    get:
      operationId: categories_active_retrieve
      description: Obtener solo categorías activas
      tags:
      - categories
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
          description: ''
  /api/v1/events/:
    get:
      operationId: events_list
      parameters:
      - in: query
        name: category
        schema:
          type: string
          format: uuid
      - in: query
        name: event_date
        schema:
          type: string
          format: date
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - cancelled
          - completed
          - draft
          - published
        description: |-
          * `draft` - Draft
          * `published` - Published
          * `cancelled` - Cancelled
          * `completed` - Completed
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEventList'
          description: ''
    post:
      operationId: events_create
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCreate'
          description: ''
  /api/v1/events/{id}/:
    get:
      operationId: events_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
    put:
      operationId: events_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EventUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EventUpdate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventUpdate'
          description: ''
    patch:
      operationId: events_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEventUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEventUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEventUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventUpdate'
          description: ''
    delete:
      operationId: events_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/events/{id}/cancel/:
    post:
      operationId: events_cancel_create
      description: Cancelar un evento
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/events/{id}/publish/:
    post:
      operationId: events_publish_create
      description: Publicar un evento
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Event'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Event'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/events/{id}/tickets/:
    get:
      operationId: events_tickets_retrieve
      description: Obtener tickets de un evento
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Event.
        required: true
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/events/by_promoter/:
    get:
      operationId: events_by_promoter_retrieve
      description: Obtener eventos de un promotor
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/events/upcoming/:
    get:
      operationId: events_upcoming_retrieve
      description: Obtener eventos próximos (no pasados)
      tags:
      - events
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
          description: ''
  /api/v1/ticket-types/:
    get:
      operationId: ticket_types_list
      parameters:
      - in: query
        name: event
        schema:
          type: string
          format: uuid
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - inactive
          - sold_out
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `sold_out` - Sold Out
      tags:
      - ticket-types
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTicketTypeList'
          description: ''
    post:
      operationId: ticket_types_create
      tags:
      - ticket-types
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketTypeCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketTypeCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketTypeCreate'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketTypeCreate'
          description: ''
  /api/v1/ticket-types/{id}/:
    get:
      operationId: ticket_types_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
    put:
      operationId: ticket_types_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketType'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketType'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketType'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
    patch:
      operationId: ticket_types_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedTicketType'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedTicketType'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedTicketType'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
    delete:
      operationId: ticket_types_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/ticket-types/{id}/activate/:
    post:
      operationId: ticket_types_activate_create
      description: Activar la venta de tickets
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketType'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketType'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketType'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
  /api/v1/ticket-types/{id}/deactivate/:
    post:
      operationId: ticket_types_deactivate_create
      description: Desactivar la venta de tickets
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this Ticket Type.
        required: true
      tags:
      - ticket-types
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketType'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TicketType'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TicketType'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
  /api/v1/ticket-types/by_event/:
    get:
      operationId: ticket_types_by_event_retrieve
      description: Obtener tipos de tickets de un evento
      tags:
      - ticket-types
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketType'
          description: ''
components:
  schemas:
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        is_active:
          type: boolean
      required:
      - description
      - id
      - name
    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        promoter_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date
        event_time:
          type: string
          format: time
        location:
          type: string
          maxLength: 255
        capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status66aEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        category_name:
          type: string
          readOnly: true
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/TicketType'
          readOnly: true
      required:
      - capacity
      - category_name
      - created_at
      - description
      - event_date
      - event_time
      - id
      - location
      - name
      - promoter_id
      - tickets
    EventCreate:
      type: object
      properties:
        promoter_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date
        event_time:
          type: string
          format: time
        location:
          type: string
          maxLength: 255
        capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status66aEnum'
        category:
          type: string
          format: uuid
          nullable: true
      required:
      - capacity
      - description
      - event_date
      - event_time
      - location
      - name
      - promoter_id
    EventUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date
        event_time:
          type: string
          format: time
        location:
          type: string
          maxLength: 255
        capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status66aEnum'
        category:
          type: string
          format: uuid
          nullable: true
      required:
      - capacity
      - description
      - event_date
      - event_time
      - location
      - name
    PaginatedCategoryList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Category'
    PaginatedEventList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Event'
    PaginatedTicketTypeList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/TicketType'
    PatchedCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        is_active:
          type: boolean
    PatchedEventUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        event_date:
          type: string
          format: date
        event_time:
          type: string
          format: time
        location:
          type: string
          maxLength: 255
        capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status66aEnum'
        category:
          type: string
          format: uuid
          nullable: true
    PatchedTicketType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        max_capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status061Enum'
    Status061Enum:
      enum:
      - active
      - inactive
      - sold_out
      type: string
      description: |-
        * `active` - Active
        * `inactive` - Inactive
        * `sold_out` - Sold Out
    Status66aEnum:
      enum:
      - draft
      - published
      - cancelled
      - completed
      type: string
      description: |-
        * `draft` - Draft
        * `published` - Published
        * `cancelled` - Cancelled
        * `completed` - Completed
    TicketType:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        max_capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status061Enum'
      required:
      - description
      - event_id
      - id
      - max_capacity
      - name
      - price
    TicketTypeCreate:
      type: object
      properties:
        event:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        description:
          type: string
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        max_capacity:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        status:
          $ref: '#/components/schemas/Status061Enum'
      required:
      - description
      - event
      - max_capacity
      - name
      - price
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
