version: '3.8'

services:
  # ===== BASES DE DATOS =====

  auth-db:
    image: postgres:15
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - auth_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  profiles-db:
    image: postgres:15
    container_name: profiles_db
    environment:
      POSTGRES_DB: profiles_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - profiles_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d profiles_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  events-db:
    image: postgres:15
    container_name: events_db
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - events_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== MICROSERVICIOS =====

  service-auth:
    build: ./service-auth
    container_name: service_auth
    ports:
      - "8000:8000"
    environment:
      DB_NAME: auth_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: auth-db
      DB_PORT: 5432
      DEBUG: "True"
      SECRET_KEY: "django-insecure-your-secret-key-change-this"
      DJANGO_SETTINGS_MODULE: auth_config.settings   # ✅ AGREGAR
    depends_on:
      auth-db:
        condition: service_healthy
    volumes:
      - ./service-auth:/app
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  service-profiles:
    build: ./service-profiles
    container_name: service_profiles
    ports:
      - "8001:8000"
    environment:
      DB_NAME: profiles_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: profiles-db
      DB_PORT: 5432
      DEBUG: "True"
      SECRET_KEY: "django-insecure-your-secret-key-change-this"
      DJANGO_SETTINGS_MODULE: profiles_config.settings   # ✅ AGREGAR
      AUTH_SERVICE_URL: "http://service-auth:8000"
    depends_on:
      profiles-db:
        condition: service_healthy
      service-auth:
        condition: service_started
    volumes:
      - ./service-profiles:/app
    command: >
      sh -c "python manage.py makemigrations profiles &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  service-events:
    build: ./service-events
    container_name: service_events
    ports:
      - "8002:8000"
    environment:
      DB_NAME: events_db
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: events-db
      DB_PORT: 5432
      DEBUG: "True"
      SECRET_KEY: "django-insecure-your-secret-key-change-this"
      DJANGO_SETTINGS_MODULE: events_config.settings   # ✅ AGREGAR
      AUTH_SERVICE_URL: "http://service-auth:8000"
    depends_on:
      events-db:
        condition: service_healthy
      service-auth:
        condition: service_started
    volumes:
      - ./service-events:/app
    command: >
      sh -c "python manage.py makemigrations events &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ===== FRONTEND =====

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_AUTH_URL: "http://service-auth:8000"
      REACT_APP_PROFILES_URL: "http://service-profiles:8000"
      REACT_APP_EVENTS_URL: "http://service-events:8000"
    depends_on:
      - service-auth
      - service-profiles
      - service-events
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  auth_data:
  profiles_data:
  events_data: